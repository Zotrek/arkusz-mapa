# Test: czy GitHub w ogóle odpala on.schedule w tym repo.
# 12:30 Warszawa (CEST) = 10:30 UTC. Po weryfikacji usuń ten plik lub wpis cron.
name: arkusz-mapa schedule smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '30 10 * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Potwierdzenie harmonogramu
        run: |
          echo "schedule smoke OK"
          echo "event=${{ github.event_name }}"
          date -u
