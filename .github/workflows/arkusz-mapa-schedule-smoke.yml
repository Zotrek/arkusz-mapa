# Test natywnego harmonogramu GitHub Actions w tym repo.
# 13:30 Warszawa (CEST, lato) = 11:30 UTC.
# Zimą (CET): uruchamia się o 12:30 warszawskiego (CET = UTC+1).
name: arkusz-mapa schedule smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '30 11 * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Potwierdzenie harmonogramu
        run: |
          echo "schedule smoke OK"
          echo "event=${{ github.event_name }}"
          date -u
