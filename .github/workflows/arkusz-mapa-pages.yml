# Ręcznie: Actions → „arkusz-mapa — Pages” → Run workflow.
# Katalog główny repozytorium = ten pakiet (arkusz-mapa).
#
# Wymagane sekrety:
#   GOOGLE_SHEETS_ID              — ID arkusza z URL Google Sheets
#   GOOGLE_SERVICE_ACCOUNT_JSON   — cały plik JSON klucza Service Account
#
# W repo muszą być (domyślnie):
#   docs/pusty.docx
#   docs/podwyko lista.xlsx
#
# Opcjonalnie — stały cache adresów (żeby nie geokodować od zera na CI):
#   data/phase5-cache.json  (skopiuj lokalny OUTPUT_DIR/phase5-cache.json, patrz data/README.txt)
#
# GitHub: Settings → Pages → Source: „GitHub Actions”.
# Nie dodawaj drugiego workflowu Pages (np. szablon „Jekyll”) — ten sam concurrency
# „pages” i zły artefakt dają 404 lub nadpisują tę stronę.
#
# Dwa joby: „build” BEZ środowiska github-pages (token może zapisywać actions/cache).
# „deploy” TYLKO z environment github-pages — inaczej cache między runami często nie działa.
#
# Każde uruchomienie zastępuje całą witrynę Pages (tylko mapy z tego biegu).
name: arkusz-mapa — Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cały katalog .cache/ — pojedynczy plik w path bywał niestabilny przy save/restore.
      - name: Przywróć cache adresów (faza 5)
        id: cache-phase5
        uses: actions/cache@v4
        with:
          path: .cache
          key: phase5-geocode-v2-${{ github.run_id }}
          restore-keys: |
            phase5-geocode-v2-

      # Gdy Actions cache nic nie dał — użyj pliku z commita (Twój już zapisany cache).
      - name: Seed cache z repozytorium (gdy brak pliku z Actions)
        run: |
          mkdir -p .cache
          if [ -f .cache/phase5-cache.json ] && [ -s .cache/phase5-cache.json ]; then
            echo "Jest .cache/phase5-cache.json z Actions ($(wc -c < .cache/phase5-cache.json) b)."
          elif [ -f data/phase5-cache.json ] && [ -s data/phase5-cache.json ]; then
            cp data/phase5-cache.json .cache/phase5-cache.json
            echo "Załadowano data/phase5-cache.json ($(wc -c < .cache/phase5-cache.json) b) — geokodowanie z tego pliku."
          else
            echo "::warning::Brak cache: ani Actions, ani data/phase5-cache.json — faza 5 zacznie od zera."
          fi

      - name: Raport cache (diagnostyka)
        run: |
          echo "actions/cache cache-hit=${{ steps.cache-phase5.outputs.cache-hit }}"
          if [ -f .cache/phase5-cache.json ]; then
            echo "phase5-cache.json: bytes=$(wc -c < .cache/phase5-cache.json)"
            node -e "
              const fs = require('fs');
              const p = '.cache/phase5-cache.json';
              const j = JSON.parse(fs.readFileSync(p,'utf8'));
              const n = j.entries && typeof j.entries === 'object' ? Object.keys(j.entries).length : 0;
              console.log('JSON version=', j.version, 'entries=', n);
            " || echo "(niepoprawny JSON — faza 5 wczyta 0 wpisów)"
          else
            echo "Brak pliku .cache/phase5-cache.json przed generate."
          fi

      # cache: npm — patrz komentarz w arkusz-mapa-ci.yml
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Zapis klucza Service Account
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::Brak sekretu GOOGLE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > .ci-credentials.json

      - name: Generuj mapę (Google Sheets → HTML)
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/.ci-credentials.json
          OUTPUT_DIR: ${{ github.workspace }}/site/maps
          PHASE5_CACHE_PATH: ${{ github.workspace }}/.cache/phase5-cache.json
        run: |
          if [ -z "$GOOGLE_SHEETS_ID" ]; then
            echo "::error::Brak sekretu GOOGLE_SHEETS_ID"
            exit 1
          fi
          mkdir -p "$OUTPUT_DIR"
          npm run generate

      - name: Strona indeksu (lista map)
        run: node scripts/build-pages-index.mjs

      - name: Konfiguracja Pages
        uses: actions/configure-pages@v5

      - name: Pakiet statyczny
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publikacja na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
